<script>
// ==================== CẤU HÌNH LƯU TRỮ ====================
const SECRET = "KL2025!@#";
var dStr = new Date().toISOString().slice(0,10);
var DB = JSON.parse(localStorage.getItem('KL_MASTER_DB'));
if (!DB) DB = { users:{}, chats:[], history:{}, logs:[], tracking:{}, stats:{}, allKeys:{} };
if (!DB.stats) DB.stats = {};
if (!DB.allKeys) DB.allKeys = {}; 
if (!DB.stats[dStr]) DB.stats[dStr] = {tao:0, tc:0, tb:0};
function saveDB(){ localStorage.setItem('KL_MASTER_DB', JSON.stringify(DB)); }

var AD_USER = "YonkiVNOfficial", AD_PASS = "YonkiVNOfficial";
var API_LINK4M = "688d0212c6e84d0e055ba168";
var KEY_FREE_DURATION_MS = 43200000; // 12H mặc định

var cUser = localStorage.getItem('kl_v17_cu') || null;
var guestID = localStorage.getItem('kl_v17_gid');
if (!guestID) { guestID = "Khach_" + Math.floor(10000 + Math.random()*89999); localStorage.setItem('kl_v17_gid',guestID); }
var myID = cUser || guestID;
var isAdmin = (cUser === AD_USER);
var maxL = isAdmin ? 999 : (cUser ? 3 : 1);

var currentKey = null, currentToken = null, linkDaTao = false;

// ==================== HỆ THỐNG MÃ HÓA & KIỂM TRA ====================
async function sha256(m) {
    var b = new TextEncoder().encode(m);
    var h = await crypto.subtle.digest('SHA-256', b);
    var a = Array.from(new Uint8Array(h));
    return a.map(x => x.toString(16).padStart(2,'0')).join('');
}
async function taoChecksum(s) {
    var randomPart = Math.random().toString(36).substring(2, 8).toUpperCase();
    var d = SECRET + s + "KHUNGLONG_" + randomPart;
    var f = await sha256(d);
    return f.substring(0, 8).toUpperCase() + randomPart;
}
async function taoKeyTheoThoiGian(t, v) {
    var c = await taoChecksum(v);
    return v + (t==='h'?'h':'day') + 'KHUNGLONG_' + c;
}
async function taoKeyNgauNhien() {
    var c = await taoChecksum("12");
    return '12hKHUNGLONG_' + c;
}

// ==================== GIAO DIỆN & TÀI KHOẢN ====================
function scrollToSec(id) { var e = document.getElementById(id); if (e) e.scrollIntoView({behavior:'smooth'}); }
function showAuthBox(){ document.getElementById('auth-box').style.display='block'; document.getElementById('btn-auth').style.display='none'; }

function sysReg(){
    var u = document.getElementById('a-id').value.trim(), p = document.getElementById('a-pw').value.trim();
    if (!u||!p) return alert('Vui lòng nhập đủ thông tin!');
    if (u.toLowerCase().indexOf('admin')>=0 || u===AD_USER) return alert('Tên tài khoản không hợp lệ!');
    if (DB.users[u]) return alert('Tài khoản đã tồn tại!');
    DB.users[u] = {p:p, date:new Date().toLocaleDateString()}; saveDB(); alert('✅ Đăng ký thành công!');
}
function sysLogin(){
    var u = document.getElementById('a-id').value.trim(), p = document.getElementById('a-pw').value.trim();
    if (u===AD_USER && p===AD_PASS) { localStorage.setItem('kl_v17_cu',AD_USER); return location.reload(); }
    if (!DB.users[u] || DB.users[u].p !== p) return alert('Sai tài khoản hoặc mật khẩu!');
    localStorage.setItem('kl_v17_cu',u); location.reload();
}
function logout(){ localStorage.removeItem('kl_v17_cu'); location.reload(); }

// ==================== CHECK KEY (USER SIDE) ====================
function kichHoatCode(){
    var code = document.getElementById('i-code').value.trim(), msg = document.getElementById('key-status-msg');
    if (!code) { msg.innerHTML = '<span style="color:#dc143c">⚠️ Vui lòng nhập Key!</span>'; return; }
    
    if (DB.allKeys[code]) {
        var kData = DB.allKeys[code];
        
        // NẾU KEY CHƯA TỪNG ĐƯỢC KÍCH HOẠT, BẮT ĐẦU TÍNH GIỜ TỪ BÂY GIỜ
        if (kData.exp === 0) {
            kData.exp = Date.now() + kData.durationMs;
            DB.allKeys[code] = kData;
            saveDB();
        }

        if (Date.now() > kData.exp) {
            msg.innerHTML = '<span style="color:#dc143c">❌ KEY ĐÃ HẾT HẠN!</span>'; return;
        }
        
        var rem = kData.exp - Date.now(), d = Math.floor(rem/86400000), h = Math.floor((rem%86400000)/3600000), m = Math.floor((rem%3600000)/60000);
        msg.innerHTML = '<span style="color:#10b981">✅ KEY HỢP LỆ! Game: '+kData.game+'<br>Hạn còn: '+(d>0?d+'d ':'')+h+'h '+m+'m<br>Thiết bị: '+(kData.devs.length)+'/'+kData.maxDev+'</span>';
        
        if (!DB.users[myID]) DB.users[myID] = {p:"guest"};
        DB.users[myID].activeKey = code; DB.users[myID].exp = kData.exp;
        saveDB(); return;
    }

    msg.innerHTML = '<span style="color:#dc143c">❌ KEY KHÔNG TỒN TẠI HOẶC SAI!</span>';
}


// ==================== BẢNG ADMIN & KIỂM TRA ====================
async function updateKeyPreview(){
    var t = document.getElementById('admin-key-type').value;
    var v = document.getElementById('admin-key-val').value || 1;
    var dev = document.getElementById('admin-key-dev').value || 1;
    var game = document.getElementById('admin-key-game').value || "Free Fire";
    
    var key = await taoKeyTheoThoiGian(t, parseInt(v));
    document.getElementById('admin-key-preview').innerHTML = key + '<br><span style="font-size:10px;color:#a1a1aa">('+dev+' TB | Game: '+game+')</span>';
}

async function adminTaoKeyBan(){
    if (!isAdmin) return;
    var t = document.getElementById('admin-key-type').value;
    var v = parseInt(document.getElementById('admin-key-val').value) || 1;
    var maxDev = parseInt(document.getElementById('admin-key-dev').value) || 1;
    var gameName = document.getElementById('admin-key-game').value.trim() || "Free Fire";
    
    if (v < 1) return alert('Thời gian phải lớn hơn 0!');
    
    var key = await taoKeyTheoThoiGian(t, v);
    var durationMs = t === 'h' ? (v * 3600000) : (v * 86400000);
    
    // TẠO KEY VIP: exp = 0 (Chưa kích hoạt)
    DB.allKeys[key] = {
        type: "vip",
        durationMs: durationMs,
        exp: 0, 
        maxDev: maxDev,
        devs: [],
        game: gameName,
        created: Date.now()
    };

    if (!DB.history[myID]) DB.history[myID] = [];
    DB.history[myID].unshift({t:new Date().toLocaleTimeString(), k:key, m:'🎁 Tạo Key VIP ('+v+t+')'});

    saveDB();
    document.getElementById('admin-key-preview').innerHTML = '✅ TẠO THÀNH CÔNG: <br>' + key;
    alert('✅ Đã tạo thành công Key VIP! Thời gian sẽ tính từ lúc người mua dán vào game.'); 
    uiHis(); loadAdmin();
}

function adminCheckKeyStatus(){
    if (!isAdmin) return;
    var key = document.getElementById('admin-check-val').value.trim();
    var resBox = document.getElementById('admin-check-result');
    if (!key) return alert('Dán key vào!');
    
    if (DB.allKeys[key]) {
        var kData = DB.allKeys[key];
        var stStr = "";
        
        if (kData.exp === 0) {
            stStr = '<span class="text-green">🟢 CHƯA KÍCH HOẠT (Sẽ bắt đầu đếm khi nhập)</span>';
        } else {
            var isExp = Date.now() > kData.exp;
            var rem = kData.exp - Date.now();
            stStr = isExp ? '<span class="text-red">🔴 ĐÃ HẾT HẠN</span>' : '<span class="text-green">🟢 ĐANG CHẠY (Còn '+Math.floor(rem/3600000)+'h '+Math.floor((rem%3600000)/60000)+'m)</span>';
        }

        var devList = kData.devs.length > 0 ? kData.devs.join('<br>') : 'Chưa có thiết bị nào';
        
        resBox.style.display = 'block';
        resBox.innerHTML = `
            <b>🔑 Key:</b> ${key}<br>
            <b>🎮 Game:</b> ${kData.game}<br>
            <b>⏰ Tình trạng:</b> ${stStr}<br>
            <b>📱 Thiết bị (HWID):</b> ${kData.devs.length} / ${kData.maxDev}<br>
            <div style="margin-top:6px;border-top:1px solid #444;padding-top:4px">
                <b>Danh sách ID Thiết Bị:</b><br>
                <span class="text-gray">${devList}</span>
            </div>
            <button class="btn btn-danger btn-sm mt-8" onclick="adminResetKeyDevices('${key}')">🔄 XÓA LỊCH SỬ THIẾT BỊ (RESET HWID)</button>
        `;
    } else {
        resBox.style.display = 'block';
        resBox.innerHTML = '<span class="text-red">❌ Key không tồn tại trên hệ thống.</span>';
    }
}

function adminResetKeyDevices(keyStr) {
    if(confirm('Bạn muốn reset số thiết bị của KEY này? (User có thể nhập HWID mới)')){
        if(DB.allKeys[keyStr]){
            DB.allKeys[keyStr].devs = [];
            saveDB();
            alert('✅ Đã reset thiết bị cho key thành công!');
            adminCheckKeyStatus();
        }
    }
}

// Admin bypass link lấy thẳng key free
async function adminLayKeyNhanh(){
    currentKey = await taoKeyNgauNhien();
    
    // Key Free tạo nhanh: Vẫn set exp = 0 để bắt đầu khi dùng
    DB.allKeys[currentKey] = { type: "free", durationMs: KEY_FREE_DURATION_MS, exp: 0, maxDev: 1, devs: [], game: "Free Fire", created: Date.now() };

    if (!DB.history[myID]) DB.history[myID] = [];
    DB.history[myID].unshift({t:new Date().toLocaleTimeString(), k:currentKey, m:"Admin Generate Free Key"});
    saveDB();
    
    var lc = document.getElementById('link-container'); lc.style.display = 'block';
    document.getElementById('link-rutgon').style.display = 'none';
    document.getElementById('btn-kiemtra').style.display = 'none';
    document.getElementById('bypass-status').innerHTML = '<span style="color:#ffd700">✅ KEY ADMIN TẠO NHANH (Chưa kích hoạt)</span>';
    document.getElementById('key-result').style.display = 'block';
    document.getElementById('key-result').innerHTML = '<div class="key-display">🔑 '+currentKey+'</div><button class="btn btn-primary" style="width:100%;padding:14px;font-size:13px" onclick="copyCurrentKey()">📋 SAO CHÉP</button>';
}

// ==================== TẠO LINK KEY FREE ====================
async function taoLink(){
    if (linkDaTao) return alert('⚠️ Bạn đang có một link chờ xử lý!');
    var uL = parseInt(localStorage.getItem('kl_l_'+myID+'_'+dStr)) || 0;
    if (uL >= maxL && !isAdmin) return alert('❌ Đã hết lượt tạo key hôm nay!');

    currentKey = await taoKeyNgauNhien();
    currentToken = 'bypass_' + Math.random().toString(36).substring(2,15) + '_' + Date.now();

    // LƯU DB: Ghi nhận exp = 0 để chờ user vượt link xong mới tính
    DB.allKeys[currentKey] = {
        type: "free", durationMs: KEY_FREE_DURATION_MS, exp: 0, maxDev: 1, devs: [], game: "Free Fire", created: Date.now()
    };

    DB.tracking[currentToken] = {status:"pending", time:Date.now(), key:currentKey, user:myID};
    DB.stats[dStr].tao += 1;
    saveDB();

    var dest = window.location.origin + window.location.pathname + '?key=' + encodeURIComponent(currentKey) + '&u=' + encodeURIComponent(myID) + '&token=' + encodeURIComponent(currentToken);
    var shortLink = 'https://link4m.co/st?api=' + API_LINK4M + '&url=' + encodeURIComponent(dest);

    var lc = document.getElementById('link-container'); lc.style.display = 'block';
    document.getElementById('link-rutgon').href = shortLink;
    document.getElementById('link-rutgon').style.display = 'block';
    document.getElementById('btn-kiemtra').style.display = 'block';
    document.getElementById('key-result').style.display = 'none';
    document.getElementById('bypass-status').innerText = '🔗 Hãy nhấn vào link trên để vượt, sau đó bấm nút bên dưới.';
    document.getElementById('btn-link').innerText = '🔄 ĐANG TẠO LINK...';
    document.getElementById('btn-link').disabled = true;

    linkDaTao = true;
    localStorage.setItem('kl_l_'+myID+'_'+dStr, uL+1);
}

function kiemTraToken(){
    var statusEl = document.getElementById('bypass-status');
    var up = new URLSearchParams(window.location.search);
    var urlToken = up.get('token');

    if (urlToken && DB.tracking[urlToken] && DB.tracking[urlToken].user === myID) {
        var track = DB.tracking[urlToken];
        if (track.status === 'pending' || track.status === 'success') {
            track.status = 'success';
            currentKey = track.key;
            
            if (!DB.history[myID]) DB.history[myID] = [];
            DB.history[myID].unshift({t:new Date().toLocaleTimeString(), k:currentKey, m:'🎯 Đã Vượt Link'});
            if (DB.stats && DB.stats[dStr]) DB.stats[dStr].tc += 1;
            saveDB();
            
            hienThiKey();
            if (window.history && window.history.replaceState) {
                window.history.replaceState({}, document.title, window.location.pathname);
            }
            return;
        }
    }

    if (DB.tracking[currentToken] && DB.tracking[currentToken].status === 'success') {
        currentKey = DB.tracking[currentToken].key;
        hienThiKey();
    } else {
        statusEl.innerHTML = '<span style="color:#dc143c">❌ BẠN CHƯA VƯỢT LINK HOẶC VƯỢT SAI!</span>';
    }
}

function hienThiKey(){
    var keyResult = document.getElementById('key-result');
    var statusEl = document.getElementById('bypass-status');
    keyResult.style.display = 'block';
    
    keyResult.innerHTML = '<div class="key-display">🔑 '+currentKey+'</div><button class="btn btn-primary" style="width:100%;padding:14px;font-size:13px" onclick="copyCurrentKey()">📋 SAO CHÉP KEY</button><div class="text-xs text-gray mt-8">⏰ Thời gian sẽ bắt đầu đếm từ lúc bạn nhập vào Game</div>';
    statusEl.innerHTML = '<span style="color:#ffd700">✅ NHẬN KEY THÀNH CÔNG!</span>';
    
    document.getElementById('link-rutgon').style.display = 'none';
    document.getElementById('btn-kiemtra').style.display = 'none';
    document.getElementById('btn-link').innerText = '✅ ĐÃ NHẬN XONG';
    document.getElementById('btn-link').disabled = true;
    linkDaTao = false;
}

function copyCurrentKey(){
    if (!currentKey) return;
    if (navigator.clipboard) { navigator.clipboard.writeText(currentKey); alert('✅ Đã copy vào bộ nhớ đệm!'); }
}

// =========================================================================
// HỆ THỐNG API GIAO TIẾP VỚI GAME SCRIPT / MOD MENU LIÊN KẾT
// DEV GAME CHỈ CẦN GỌI: window.API_CheckKey(keyString, ID_ThietBi, TenGame)
// =========================================================================
window.API_CheckKey = function(key, deviceId, gameName) {
    var response = { valid: false, msg: "", exp: 0 };
    var syncDB = JSON.parse(localStorage.getItem('KL_MASTER_DB')) || DB;
    
    if (!syncDB.allKeys || !syncDB.allKeys[key]) {
        response.msg = "Key không tồn tại trên hệ thống.";
        return JSON.stringify(response);
    }
    
    var kData = syncDB.allKeys[key];
    
    // Nếu key hợp lệ nhưng CHƯA TỪNG KHỞI ĐỘNG (exp = 0) -> Bắt đầu đếm giờ
    if (kData.exp === 0) {
        kData.exp = Date.now() + kData.durationMs;
    }
    
    if (Date.now() > kData.exp) {
        response.msg = "Key đã hết hạn sử dụng.";
        return JSON.stringify(response);
    }
    
    // Check Game
    if (kData.game && kData.game.toLowerCase() !== gameName.toLowerCase()) {
        response.msg = "Key này không hỗ trợ game hiện tại!";
        return JSON.stringify(response);
    }
    
    // Check thiết bị (HWID)
    if (!kData.devs.includes(deviceId)) {
        if (kData.devs.length >= kData.maxDev) {
            response.msg = "Key đã bị giới hạn ở 1 thiết bị khác. Liên hệ Admin để Reset HWID.";
            return JSON.stringify(response);
        }
        // Thêm thiết bị mới
        kData.devs.push(deviceId);
    }
    
    // LƯU LẠI VÀO CƠ SỞ DỮ LIỆU
    syncDB.allKeys[key] = kData;
    localStorage.setItem('KL_MASTER_DB', JSON.stringify(syncDB)); 
    
    response.valid = true;
    response.msg = "Kích hoạt hợp lệ!";
    response.exp = kData.exp; // Timestamp chuẩn trả về game
    return JSON.stringify(response);
};

// ==================== INITIALIZE ====================
function uiHis(){
    var h = DB.history[myID] || [];
    document.getElementById('box-his').innerHTML = h.map(function(i){
        return '<div class="mb-8" style="background:#000;padding:10px;border-radius:10px;border:1px solid rgba(255,215,0,0.1)"><span class="text-gray text-xs">🕒 '+i.t+' | '+i.m+'</span><br><b class="text-yellow">🔑 '+i.k+'</b></div>';
    }).join('') || '<div class="text-gray text-center">Chưa có dữ liệu giao dịch.</div>';
}

function loadAdmin(){
    document.getElementById('admin-panel').style.display = 'block';
    updateKeyPreview();
}

function loadUI(){
    document.getElementById('u-name').innerText = myID;
    if(isAdmin){ document.getElementById('u-role').innerText='👑 ADMIN'; loadAdmin(); }
    uiHis();
}

(function(){
    var up = new URLSearchParams(window.location.search);
    var k = up.get('key'), cb = up.get('u'), token = up.get('token');
    if (k && cb===myID && token && DB.tracking[token] && DB.tracking[token].user === myID && DB.tracking[token].status === 'pending') {
        DB.tracking[token].status = 'success';
        currentKey = k; 
        if (!DB.history[myID]) DB.history[myID] = [];
        DB.history[myID].unshift({t:new Date().toLocaleTimeString(), k:k, m:'🎯 Vượt link thành công'});
        saveDB();
        
        var lc = document.getElementById('link-container'); if (lc) lc.style.display = 'block';
        document.getElementById('link-rutgon').style.display = 'none';
        document.getElementById('btn-kiemtra').style.display = 'none';
        document.getElementById('key-result').style.display = 'block';
        
        document.getElementById('key-result').innerHTML = '<div class="key-display">🔑 '+k+'</div><button class="btn btn-primary" style="width:100%;padding:14px;font-size:13px" onclick="copyCurrentKey()">📋 COPY NGAY</button><div class="text-xs text-gray mt-8">⏰ Thời gian sẽ bắt đầu đếm khi dán vào Game</div>';
        
        document.getElementById('btn-link').innerText = '✅ XONG'; document.getElementById('btn-link').disabled = true; linkDaTao = false;
        if (window.history && window.history.replaceState) { window.history.replaceState({}, document.title, window.location.pathname); }
    }
    loadUI();
})();
</script>
